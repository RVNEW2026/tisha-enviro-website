<!-- PWA Install Prompt Button (extra stylish) -->
<div id="installButton" class="hidden fixed bottom-6 right-6 bg-[#0a3d33] text-white px-6 py-4 rounded-3xl shadow-2xl flex items-center gap-3 cursor-pointer hover:bg-yellow-400 hover:text-[#0a3d33]">
    <i class="fas fa-download"></i>
    <span class="font-medium">Install App</span>
</div>

<script>
    // PWA Service Worker Registration
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js');
        });
    }

    // Install Prompt
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        document.getElementById('installButton').classList.remove('hidden');
    });

    document.getElementById('installButton').addEventListener('click', () => {
        if (deferredPrompt) {
            deferredPrompt.prompt();
            deferredPrompt = null;
            document.getElementById('installButton').classList.add('hidden');
        }
    });

    // Enquiry form alert (same as before)
    document.getElementById('enquiryForm').addEventListener('submit', function() {
        setTimeout(() => {
            alert('✅ Thank you! Your enquiry has been received. We will contact you within 24 hours.');
        }, 700);
    });
</script>
